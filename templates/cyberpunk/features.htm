<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ABCode Features :: OpenClanCMS</title>
  <style>
    :root {
      --bg: #0a0a0b; --bg2: #111114; --bg3: #1a1a1f;
      --green: #00cc3a; --green-dim: #006622;
      --amber: #b8942e; --text: #c0c0c0; --text-dim: #707070; --border: #222228;
      --font: 'Segoe UI', system-ui, sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font); background: var(--bg); color: var(--text); padding: 1rem; }
    table { width: 100%; border-collapse: collapse; }
    td { padding: 0.3rem 0.5rem; border-bottom: 1px solid var(--border); font-size: 0.85rem; }
    img { vertical-align: middle; }
    a { color: var(--green); text-decoration: none; }
    a:hover { color: var(--amber); }
    input[type=button] { background: var(--bg2); color: var(--text); border: 1px solid var(--border); padding: 0.2rem 0.5rem; cursor: pointer; border-radius: 2px; }
    input[type=button]:hover { border-color: var(--green); color: var(--green); }
  </style>
</head>
<body>
  {func:show}
</body>
</html>
