<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Debug :: ClanSphere</title>
  <style>
    :root {
      --bg: #0a0a0b; --bg2: #111114; --bg3: #1a1a1f;
      --green: #00cc3a; --amber: #b8942e; --red: #cc3333;
      --text: #c0c0c0; --text-dim: #707070; --border: #222228;
      --font: 'Fira Code', 'Consolas', monospace;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font); background: var(--bg); color: var(--text); padding: 1.5rem; font-size: 0.8rem; line-height: 1.7; }
    h1 { color: var(--green); font-size: 1rem; font-weight: 400; margin-bottom: 1rem; }
    h2 { color: var(--amber); font-size: 0.8rem; margin: 1.5rem 0 0.5rem; font-weight: 400; text-transform: uppercase; }
    pre { background: var(--bg2); border: 1px solid var(--border); padding: 1rem; overflow-x: auto; white-space: pre-wrap; border-radius: 2px; }
    .error { color: var(--red); }
    .info { color: var(--green); }
    .warn { color: var(--amber); }
  </style>
</head>
<body>
  <h1>&gt; DEBUG CONSOLE_</h1>
  {func:show}
</body>
</html>
